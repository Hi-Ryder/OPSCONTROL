<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morais Transportes</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif
    }

    :root {
      --blue: #2563EB;
      --blue-dark: #1E3A8A;
      --bg: #F3F4F6;
      --white: #FFFFFF;
      --green: #22C55E;
      --red: #EF4444;
      --yellow: #F59E0B;
      --gray: #6B7280;
      --gray-light: #E5E7EB;
      --text: #111827;
      --text2: #374151;
      --text3: #6B7280
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh
    }

    input,
    select,
    textarea {
      font-family: inherit;
      font-size: 13px;
      border: 1px solid #D1D5DB;
      border-radius: 6px;
      padding: 8px 10px;
      width: 100%;
      outline: none;
      background: #fff;
      color: var(--text)
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15)
    }

    button {
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      transition: all .15s
    }

    .btn-primary {
      background: var(--blue);
      color: #fff
    }

    .btn-primary:hover {
      background: #1d4ed8
    }

    .btn-success {
      background: var(--green);
      color: #fff
    }

    .btn-success:hover {
      background: #16a34a
    }

    .btn-danger {
      background: var(--red);
      color: #fff
    }

    .btn-danger:hover {
      background: #dc2626
    }

    .btn-warning {
      background: var(--yellow);
      color: #fff
    }

    .btn-warning:hover {
      background: #d97706
    }

    .btn-outline {
      background: #fff;
      color: var(--blue);
      border: 1px solid var(--blue)
    }

    .btn-outline:hover {
      background: #eff6ff
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600
    }

    .badge-green {
      background: #dcfce7;
      color: #15803d
    }

    .badge-red {
      background: #fee2e2;
      color: #b91c1c
    }

    .badge-yellow {
      background: #fef3c7;
      color: #92400e
    }

    .badge-blue {
      background: #dbeafe;
      color: #1d4ed8
    }

    .badge-gray {
      background: #f3f4f6;
      color: #374151
    }

    table {
      width: 100%;
      border-collapse: collapse
    }

    th {
      background: #f9fafb;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text3);
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--gray-light)
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #f3f4f6;
      color: var(--text2);
      font-size: 13px
    }

    tr:last-child td {
      border-bottom: none
    }

    tr:hover td {
      background: #f9fafb
    }

    .card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid var(--gray-light);
      padding: 20px
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, .45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000
    }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto
    }

    .modal-lg {
      max-width: 700px
    }

    .form-group {
      margin-bottom: 14px
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 5px
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px
    }

    .alert-warning {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a
    }

    .alert-danger {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca
    }

    .alert-success {
      background: #dcfce7;
      color: #15803d;
      border: 1px solid #bbf7d0
    }

    .stat-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid var(--gray-light);
      padding: 16px
    }

    .stat-label {
      font-size: 11px;
      color: var(--text3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px
    }

    .stat-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--text)
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 3px
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: #f3f4f6;
      padding: 4px;
      border-radius: 8px
    }

    .tab {
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text3);
      border: none;
      background: transparent
    }

    .tab.active {
      background: #fff;
      color: var(--blue);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .1)
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text)
    }
  </style>
</head>

<body>

  <script>

        { id: 2, data: '2025-04-03', motorista: 'João Silva', pix: 'joao.silva@pix', favorecido: 'João Silva', valor: 3415, base: 'ESV8', criadoPor: 'Ana Mercado', criadoEm: '2025-04-03', enviado: true },
      ],

        { id: 1, motorista: 'João Silva', semana: '2025-W15', valor: 5025, pix: 'joao.silva@pix', status: 'pendente', dataPagamento: null, pagoBy: null, origem: 'amazon' },
        { id: 2, motorista: 'Pedro Souza', semana: '2025-W15', valor: 2980, pix: 'pedro.souza@pix', status: 'pendente', dataPagamento: null, pagoBy: null, origem: 'amazon' },
        { id: 3, motorista: 'Maria Costa', semana: '2025-W15', valor: 5125, pix: '', status: 'pendente', dataPagamento: null, pagoBy: null, origem: 'mercado' },
        { id: 4, motorista: 'João Silva', semana: '2025-W14', valor: 4335, pix: 'joao.silva@pix', status: 'pago', dataPagamento: '2025-04-05', pagoBy: 'Pedro Financeiro', origem: 'amazon' },
        { id: 5, motorista: 'João Silva', semana: '2025-W14', valor: 3415, pix: 'joao.silva@pix', status: 'pago', dataPagamento: '2025-04-05', pagoBy: 'Pedro Financeiro', origem: 'mercado' },
      ],
      funcionarios: [
        { id: 1, nome: 'Carlos Amazon', cargo: 'Operador Amazon', salario: 2800, vr: 220, vt: 180, pix: 'carlos@pix', status: 'ativo', admissao: '2023-03-01' },
        { id: 2, nome: 'Ana Mercado', cargo: 'Operador ML', salario: 2800, vr: 220, vt: 180, pix: 'ana@pix', status: 'ativo', admissao: '2023-03-01' },
        { id: 3, nome: 'Julia RH', cargo: 'Analista RH', salario: 3200, vr: 220, vt: 200, pix: 'julia@pix', status: 'ativo', admissao: '2022-08-15' },
        { id: 4, nome: 'Pedro Financeiro', cargo: 'Analista Financeiro', salario: 3500, vr: 220, vt: 200, pix: 'pedro@pix', status: 'ativo', admissao: '2022-06-01' },
      ],
      logs: [
        { id: 1, usuario: 'Carlos Amazon', acao: 'Criou lançamento Amazon semana 2025-W15', data: '2025-04-10 09:23' },
        { id: 2, usuario: 'Ana Mercado', acao: 'Criou lançamento Mercado Livre semana 2025-W15', data: '2025-04-10 10:11' },
        { id: 3, usuario: 'Pedro Financeiro', acao: 'Marcou pagamento de João Silva (W14) como pago', data: '2025-04-05 14:02' },
        { id: 4, usuario: 'Julia RH', acao: 'Enviou folha RH março/2025 ao Financeiro', data: '2025-03-30 16:45' },
      ],
      loginError: '', loginEmail: '', loginPass: '', vrMesAtual: {}, descontosMesAtual: {}, folhaMesFiltro: new Date().toISOString().slice(0, 7),
      filters: { search: '', dataInicio: '', dataFim: '' },
    };

    const ROLES = {
      admin: { label: 'Administrador', color: 'badge-blue' },
      op_amazon: { label: 'Op. Amazon', color: 'badge-blue' },
      op_mercado: { label: 'Op. Mercado Livre', color: 'badge-blue' },
      op_financeiro: { label: 'Op. Financeiro', color: 'badge-blue' },
      op_rh: { label: 'Op. RH', color: 'badge-blue' },
      supervisor: { label: 'Supervisor', color: 'badge-gray' },
    };

    function canAccess(menu) {
      const r = STATE.currentUser?.role;
      if (r === 'admin') return true;
      const map = {
        dashboard: true,
        amazon: ['op_amazon', 'supervisor'].includes(r),
        mercado: ['op_mercado', 'supervisor'].includes(r),
        financeiro: r === 'op_financeiro',
        rh: r === 'op_rh',
        cadastros: ['op_amazon', 'op_mercado', 'op_rh', 'supervisor'].includes(r),
        relatorios: ['supervisor', 'op_rh', 'op_financeiro'].includes(r),
        contratos: r === 'op_rh',
        administracao: false
      };
      return map[menu] || false;
    }
    function addLog(acao) { STATE.logs.unshift({ id: Date.now(), usuario: STATE.currentUser.name, acao, data: new Date().toLocaleString('pt-BR') }); }
    function today() { return new Date().toISOString().split('T')[0]; }
    function semanaAtual() { const d = new Date(), y = d.getFullYear(), start = new Date(y, 0, 1), w = Math.ceil((((d - start) / 86400000) + start.getDay() + 1) / 7); return `${y}-W${String(w).padStart(2, '0')}`; }
    function findPaymentDate(contaId, motorista, valor, origem) {
      if (contaId) {
        const c = STATE.contasPagar.find(x => x.id === contaId && x.status === 'pago');
        return c ? c.dataPagamento : null;
      }
      const c = STATE.contasPagar.find(x => x.motorista === motorista && x.valor === valor && x.origem === origem && x.status === 'pago');
      return c ? c.dataPagamento : null;
    }
    function calcValor(cidade, veiculo, coletas, entregas, lastmile) { const c = STATE.cidades.find(x => x.nome === cidade) || { coleta: 20, entrega: 25, lastmile: 12 }; const v = STATE.veiculos.find(x => x.tipo === veiculo) || { adicional: 0 }; return coletas * c.coleta + entregas * c.entrega + lastmile * c.lastmile + v.adicional; }
    function render() { document.getElementById('app').innerHTML = buildHTML(); attachEvents(); }
    function buildHTML() { return STATE.view === 'login' ? buildLogin() : buildApp(); }

    function buildLogin() {
      return `<div style="display:flex;height:100vh;background:linear-gradient(135deg,#1E3A8A,#2563EB);align-items:center;justify-content:center;padding:20px">
    <div style="width:100%;max-width:400px;background:#fff;border-radius:12px;padding:40px;box-shadow:0 10px 25px rgba(0,0,0,0.2);text-align:center">
      <div style="font-size:32px;font-weight:800;color:var(--blue-dark);letter-spacing:-1px;margin-bottom:8px">Morais Transportes</div>
      <p style="color:var(--text3);font-size:13px;margin-bottom:28px">Acesso restrito a usuários autorizados</p>
      ${STATE.loginError ? `<div class="alert alert-danger" style="text-align:left;margin-bottom:16px"><span>&#9888;</span>${STATE.loginError}</div>` : ''}
      <div class="form-group" style="text-align:left"><label>E-mail</label><input id="loginEmail" type="text" placeholder="seu@email.com" value="${STATE.loginEmail}"></div>
      <div class="form-group" style="text-align:left"><label>Senha</label><input id="loginPass" type="password" placeholder="••••••••" value="${STATE.loginPass}"></div>
      <button class="btn-primary" id="btnLogin" style="width:100%;padding:12px;font-size:15px;font-weight:600;margin-top:16px">Entrar no Sistema</button>
      <p style="margin-top:20px;font-size:11px;color:var(--text3)">Dúvidas? Contate o suporte técnico.</p>
    </div>
  </div>`;
    }

    function buildApp() {
      const day = new Date().getDate();
      const pendentes = STATE.contasPagar.filter(c => c.status === 'pendente');
      const semPix = STATE.motoristas.filter(m => m.status === 'ativo' && !m.pix);
      const alerts = [];
      if (day === 30 && ['op_rh', 'admin'].includes(STATE.currentUser.role)) alerts.push({ type: 'warning', msg: 'Hoje é dia 30 — feche e envie a folha de pagamento!' });
      if (pendentes.length > 0 && ['op_financeiro', 'admin'].includes(STATE.currentUser.role)) alerts.push({ type: 'warning', msg: `${pendentes.length} pagamento(s) pendentes aguardando.` });
      if (semPix.length > 0 && ['admin', 'op_financeiro'].includes(STATE.currentUser.role)) alerts.push({ type: 'danger', msg: `${semPix.length} motorista(s) sem chave PIX cadastrada.` });
      const menus = [
        { id: 'dashboard', icon: '&#9638;', label: 'Dashboard' },
        { id: 'amazon', icon: '&#9672;', label: 'Amazon' },
        { id: 'mercado', icon: '&#9673;', label: 'Mercado Livre' },
        { id: 'rh', icon: '&#9678;', label: 'RH' },
        { id: 'financeiro', icon: '&#9670;', label: 'Financeiro' },
        { id: 'cadastros', icon: '&#9643;', label: 'Cadastros' },
        { id: 'relatorios', icon: '&#9636;', label: 'Relatórios' },
        { id: 'contratos', icon: '&#9635;', label: 'Contratos da Empresa' },
        { id: 'administracao', icon: '&#9677;', label: 'Administração' },
      ].filter(m => canAccess(m.id));
      return `<div style="display:flex;height:100vh;overflow:hidden">
    <div style="width:230px;background:#1E3A8A;display:flex;flex-direction:column;flex-shrink:0">
      <div style="padding:22px 18px;border-bottom:1px solid rgba(255,255,255,.1)">
        <div style="color:#fff;font-size:22px;font-weight:800">Morais Transportes</div>
        <div style="color:rgba(255,255,255,.55);font-size:11px;margin-top:2px">Morais Transportes</div>
      </div>
      <div style="flex:1;padding:12px 8px;overflow-y:auto">
        ${menus.map(m => `<button class="nav-item${STATE.activeMenu === m.id ? ' active' : ''}" data-menu="${m.id}" style="display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:${STATE.activeMenu === m.id ? 'rgba(255,255,255,.15)' : 'transparent'};color:${STATE.activeMenu === m.id ? '#fff' : 'rgba(255,255,255,.65)'};cursor:pointer;font-size:13px;font-weight:500;text-align:left;margin-bottom:2px">${m.icon} ${m.label}</button>`).join('')}
      </div>
      <div style="padding:14px;border-top:1px solid rgba(255,255,255,.1)">
        <div style="color:rgba(255,255,255,.9);font-size:13px;font-weight:600;padding:4px 12px">${STATE.currentUser.name}</div>
        <div style="color:rgba(255,255,255,.5);font-size:11px;padding:0 12px 8px">${ROLES[STATE.currentUser.role]?.label}</div>
        <button id="btnLogout" style="width:100%;padding:8px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:none;border-radius:6px;cursor:pointer;font-size:12px">Sair do sistema</button>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;background:var(--bg)">
      <div style="padding:24px 28px">
        ${alerts.map(a => `<div class="alert alert-${a.type}">${a.type === 'warning' ? '&#9888;' : '&#10005;'} ${a.msg}</div>`).join('')}
        ${buildSection()}
      </div>
    </div>
    ${STATE.modal ? buildModal() : ''}
  </div>`;
    }

    function buildSection() {
      switch (STATE.activeMenu) {
        case 'dashboard': return buildDashboard();
        case 'amazon': return buildLancamentos('amazon');
        case 'mercado': return buildLancamentos('mercado');
        case 'financeiro': return buildFinanceiro();
        case 'rh': return buildRH();
        case 'cadastros': return buildCadastros();
        case 'relatorios': return buildRelatorios();
        case 'contratos': return buildContratos();
        case 'administracao': return buildAdministracao();
        default: return '<p>Módulo em desenvolvimento</p>';
      }
    }

    function buildDashboard() {
      const all = [...STATE.lancamentosAmazon, ...STATE.lancamentosMercado];
      const totalValor = all.reduce((s, l) => s + l.valor, 0);
      const pendentes = STATE.contasPagar.filter(c => c.status === 'pendente');
      const pagos = STATE.contasPagar.filter(c => c.status === 'pago');
      const totalPend = pendentes.reduce((s, c) => s + c.valor, 0);
      const totalPago = pagos.reduce((s, c) => s + c.valor, 0);
      const percPago = totalValor > 0 ? (totalPago / (totalPago + totalPend) * 100).toFixed(1) : 0;
      
      const valAmz = STATE.lancamentosAmazon.reduce((s, l) => s + l.valor, 0);
      const valMlc = STATE.lancamentosMercado.reduce((s, l) => s + l.valor, 0);
      const totalOps = (valAmz + valMlc) || 1;

      // Data for Advanced Traction Chart
      const statsPorMes = {};
      const addVal = (mes, chave, val) => { if (!statsPorMes[mes]) statsPorMes[mes] = { amazon: 0, mercado: 0, pagos: 0 }; statsPorMes[mes][chave] += val; };
      
      STATE.lancamentosAmazon.forEach(l => addVal(l.data.slice(0, 7), 'amazon', l.valor));
      STATE.lancamentosMercado.forEach(l => addVal(l.data.slice(0, 7), 'mercado', l.valor));

        const matchStart = !STATE.filters.dataInicio || l.data >= STATE.filters.dataInicio;
        const matchEnd = !STATE.filters.dataFim || l.data <= STATE.filters.dataFim;
        return matchSearch && matchStart && matchEnd;

      const pendentes = listaFiltrada.filter(x => !x.enviado);

    function buildRelatorios() {
      const tab = STATE.activeSubTab || 'producao';
      const allLanc = [...STATE.lancamentosAmazon, ...STATE.lancamentosMercado];
      const porMot = {};
      allLanc.forEach(l => { if (!porMot[l.motorista]) porMot[l.motorista] = { valor: 0, qtd: 0 }; porMot[l.motorista].valor += l.valor; porMot[l.motorista].qtd += 1; });
      return `<div>
    <div class="section-header">
      <div><h2 style="font-size:20px;font-weight:700">Relatórios</h2></div>
      <div style="display:flex;gap:8px">
        <button class="btn-outline btn-sm" id="btnExportProd">&#8595; Produção CSV</button>
        <button class="btn-outline btn-sm" id="btnExportFin">&#8595; Financeiro CSV</button>
        <button class="btn-outline btn-sm" id="btnExportRH">&#8595; Folha RH CSV</button>
      </div>
    </div>
    <div class="tab-bar">
      ${(() => {
        const r = STATE.currentUser.role;
        const tabs = [];
        if (['admin', 'supervisor'].includes(r)) { tabs.push({ id: 'amazon_rep', label: 'Amazon por Base' }, { id: 'mercado_rep', label: 'Mercado Livre por Base' }); }
        if (['admin', 'op_rh'].includes(r)) { tabs.push({ id: 'rh', label: 'Relatório RH' }); }
        if (['admin', 'op_financeiro'].includes(r)) { tabs.push({ id: 'financeiro', label: 'Fluxo Financeiro' }); }
        if (r === 'admin') tabs.push({ id: 'producao', label: 'Histórico Geral' });
        
        return tabs.map(t => `<button class="tab${tab === t.id ? ' active' : ''}" data-subtab="${t.id}">${t.label}</button>`).join('');
      })()}
    </div>
    ${tab === 'producao' ? `<div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:14px">Valores acumulados por motorista</div>
      <table><thead><tr><th>Motorista</th><th>Nº Lançamentos Realizados</th><th>Valor Total Consolidado</th></tr></thead>
      <tbody>${Object.entries(porMot).map(([nome, d]) => `<tr>
        <td style="font-weight:500">${nome}</td><td style="text-align:center">${d.qtd} vez(es)</td>
        <td style="font-weight:600;color:var(--blue)">R$ ${d.valor.toLocaleString('pt-BR')}</td>
      </tr>`).join('')}</tbody></table></div>`
            : tab === 'amazon_rep' || tab === 'mercado_rep' ? (() => {
              const tipo = tab === 'amazon_rep' ? 'amazon' : 'mercado';
              const lista = tipo === 'amazon' ? STATE.lancamentosAmazon : STATE.lancamentosMercado;
              
              // Agrupamento por Base
              const porBase = {};
              lista.forEach(l => { const b = l.base || 'N/A'; if (!porBase[b]) porBase[b] = { valor: 0, qtd: 0 }; porBase[b].valor += l.valor; porBase[b].qtd += 1; });
              const maxBaseVal = Math.max(...Object.values(porBase).map(x => x.valor), 1);

              // Agrupamento por Mês
              const mesesMap = { '01': 'Jan', '02': 'Fev', '03': 'Mar', '04': 'Abr', '05': 'Mai', '06': 'Jun', '07': 'Jul', '08': 'Ago', '09': 'Set', '10': 'Out', '11': 'Nov', '12': 'Dez' };
              const porMes = {};
              lista.forEach(l => {
                const mesKey = l.data.slice(0, 7); // YYYY-MM
                if (!porMes[mesKey]) porMes[mesKey] = 0;
                porMes[mesKey] += l.valor;
              });
              const mesesSorted = Object.keys(porMes).sort(); // Ordenar meses
              const maxMesVal = Math.max(...Object.values(porMes), 1);

              return `<div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px">
                  <div class="stat-card"><div class="stat-label">Total Gasto ${tipo.toUpperCase()}</div><div class="stat-value" style="color:var(--blue);font-size:22px">R$ ${lista.reduce((s, l) => s + l.valor, 0).toLocaleString('pt-BR')}</div></div>
                  <div class="stat-card"><div class="stat-label">Bases Operando</div><div class="stat-value">${Object.keys(porBase).length}</div></div>
                  <div class="stat-card"><div class="stat-label">Total Lançamentos</div><div class="stat-value">${lista.length}</div></div>
                </div>

                <!-- Gráfico de Evolução Mensal -->
                <div class="card" style="margin-bottom:20px; background: linear-gradient(to bottom, #ffffff, #fdfdfd)">
                  <div style="font-size:14px; font-weight:700; margin-bottom:20px; color:var(--blue-dark)">Evolução Mensal de Custos</div>
                  <div style="display:flex; align-items:flex-end; gap:20px; height:200px; padding-bottom:25px; border-bottom:1px solid #eee; margin-bottom:10px">
                    ${mesesSorted.map(mKey => {
                      const [ano, mes] = mKey.split('-');
                      const valor = porMes[mKey];
                      const altura = (valor / maxMesVal * 150) + 20;
                      return `
                        <div style="flex:1; display:flex; flex-direction:column; align-items:center; position:relative">
                          <div style="font-size:10px; font-weight:700; color:var(--blue); margin-bottom:5px">R$ ${Math.round(valor/1000)}k</div>
                          <div style="width:100%; max-width:40px; height:${altura}px; background: linear-gradient(to top, var(--blue), #60a5fa); border-radius:6px 6px 0 0; transition: all 0.3s; box-shadow: 0 4px 6px -1px rgba(37,99,235,0.2)" title="R$ ${valor.toLocaleString('pt-BR')}"></div>
                          <div style="position:absolute; bottom:-25px; font-size:11px; font-weight:600; color:var(--text3)">${mesesMap[mes]}</div>
                        </div>`;
                    }).join('')}
                    ${mesesSorted.length === 0 ? '<div style="flex:1; text-align:center; color:var(--text3); font-size:13px">Sem dados históricos para exibir gráfico</div>' : ''}
                  </div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px">
                  <!-- Gráfico por Base (Compacto) -->
                  <div class="card">
                    <div style="font-size:13px;font-weight:700;margin-bottom:15px;color:var(--text)">Distribuição por Base</div>
                    ${Object.entries(porBase).sort((a,b) => b[1].valor - a[1].valor).map(([base, d]) => {
                      const perc = (d.valor / maxBaseVal * 100).toFixed(0);
                      return `<div style="margin-bottom:12px">
                        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
                          <span style="font-weight:600">${base}</span>
                          <span style="color:var(--text3)">R$ ${d.valor.toLocaleString('pt-BR')}</span>
                        </div>
                        <div style="width:100%;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden">
                          <div style="width:${perc}%;height:100%;background:var(--blue);border-radius:3px"></div>
                        </div>
                      </div>`;
                    }).join('')}
                  </div>

                  <!-- Tabela Detalhada -->
                  <div class="card">
                    <div style="font-size:13px;font-weight:700;margin-bottom:15px;color:var(--text)">Resumo Financeiro</div>
                    <table style="font-size:12px">
                      <thead><tr><th>Base</th><th style="text-align:center">Qtd</th><th>Total</th></tr></thead>
                      <tbody>${Object.entries(porBase).map(([base, d]) => `<tr><td style="font-weight:600">${base}</td><td style="text-align:center">${d.qtd}</td><td style="font-weight:700;color:var(--blue)">R$ ${d.valor.toLocaleString('pt-BR')}</td></tr>`).join('')}</tbody>
                    </table>
                  </div>
                </div>
              </div>`;
            })()
          : tab === 'financeiro' ? `<div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px">
        <div class="stat-card"><div class="stat-label">Total Pago</div><div class="stat-value" style="color:var(--green);font-size:22px">R$ ${STATE.contasPagar.filter(c => c.status === 'pago').reduce((s, c) => s + c.valor, 0).toLocaleString('pt-BR')}</div></div>
        <div class="stat-card"><div class="stat-label">Total Pendente</div><div class="stat-value" style="color:var(--red);font-size:22px">R$ ${STATE.contasPagar.filter(c => c.status === 'pendente').reduce((s, c) => s + c.valor, 0).toLocaleString('pt-BR')}</div></div>
        <div class="stat-card"><div class="stat-label">Total Geral de Transações</div><div class="stat-value" style="font-size:22px">R$ ${STATE.contasPagar.reduce((s, c) => s + c.valor, 0).toLocaleString('pt-BR')}</div></div>
      </div></div>`
            : `<div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">
        <div class="stat-card"><div class="stat-label">Custo Mensal Total (S/ VR)</div><div class="stat-value" style="color:var(--blue);font-size:22px">R$ ${STATE.funcionarios.filter(f => f.status === 'ativo').reduce((s, f) => s + f.salario + f.vt, 0).toLocaleString('pt-BR')}</div></div>
        <div class="stat-card"><div class="stat-label">Funcionários Ativos</div><div class="stat-value">${STATE.funcionarios.filter(f => f.status === 'ativo').length}</div></div>
      </div>
      <div class="card"><table>
        <thead><tr><th>Funcionário</th><th>Cargo</th><th>Salário</th><th>VT</th><th>Total Mensal (S/ VR)</th></tr></thead>
        <tbody>${STATE.funcionarios.filter(f => f.status === 'ativo').map(f => `<tr>
          <td style="font-weight:500">${f.nome}</td><td>${f.cargo}</td>
          <td>R$ ${f.salario.toLocaleString('pt-BR')}</td><td>R$ ${(f.vt).toLocaleString('pt-BR')}</td>
          <td style="font-weight:600;color:var(--blue)">R$ ${(f.salario + f.vt).toLocaleString('pt-BR')}</td>
        </tr>`).join('')}</tbody></table></div></div>`}
  </div>`;
    }

    function attachEvents() {
      document.getElementById('btnLogin')?.addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        const user = STATE.users.find(u => u.email === email && u.password === pass && u.active);
        if (user) { 
          STATE.currentUser = user; STATE.view = 'app'; STATE.loginError = ''; STATE.activeMenu = 'dashboard'; 
        } else {
          STATE.loginError = 'Dados incorretos ou usuário inativo.';
        }
        STATE.loginEmail = email; STATE.loginPass = pass; render();
      });
      document.getElementById('loginPass')?.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btnLogin')?.click(); });
      document.getElementById('btnLogout')?.addEventListener('click', () => { STATE.currentUser = null; STATE.view = 'login'; STATE.loginError = ''; STATE.loginEmail = ''; STATE.loginPass = ''; render(); });
      document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => { STATE.activeMenu = btn.dataset.menu; STATE.activeSubTab = ''; STATE.filters = { search: '', dataInicio: '', dataFim: '' }; render(); }));
      document.querySelectorAll('[data-subtab]').forEach(btn => btn.addEventListener('click', () => { STATE.activeSubTab = btn.dataset.subtab; STATE.filters = { search: '', dataInicio: '', dataFim: '' }; render(); }));

      // Eventos de Filtro (Com correção de cursor)
      document.getElementById('filterSearch')?.addEventListener('input', e => { 
        const val = e.target.value, pos = e.target.selectionStart;
        STATE.filters.search = val; render(); 
        const input = document.getElementById('filterSearch');
        if (input) { input.focus(); input.setSelectionRange(pos, pos); }
      });
      document.getElementById('filterStart')?.addEventListener('change', e => { STATE.filters.dataInicio = e.target.value; render(); });
      document.getElementById('filterEnd')?.addEventListener('change', e => { STATE.filters.dataFim = e.target.value; render(); });

      document.getElementById('chkAllFin')?.addEventListener('change', e => {
        document.querySelectorAll('.chk-fin').forEach(chk => chk.checked = e.target.checked);
        document.getElementById('btnPagarMarcados').style.display = e.target.checked ? 'block' : 'none';
      });

      document.querySelectorAll('.chk-fin').forEach(c => c.addEventListener('change', () => {
        const qtdVal = document.querySelectorAll('.chk-fin:checked').length;
        document.getElementById('btnPagarMarcados').style.display = qtdVal > 0 ? 'block' : 'none';
      }));

      document.getElementById('btnPagarMarcados')?.addEventListener('click', () => {
        const marcados = Array.from(document.querySelectorAll('.chk-fin:checked')).map(c => parseFloat(c.dataset.id));
        if (!marcados.length) return;
        STATE.modal = {
          type: 'confirm', title: 'Liquidação em Massa', message: `Você está liquidando ${marcados.length} faturas.<br>Confirma que os pagamentos foram realizados no banco com as referidas chaves?`, onConfirm: () => {
            marcados.forEach(id => {
              const c = STATE.contasPagar.find(x => x.id === id);
              if (c) { c.status = 'pago'; c.dataPagamento = today(); c.pagoBy = STATE.currentUser.name; }
            });
            addLog(`Módulo Financeiro baixou em lote ${marcados.length} pagamentos pendentes.`);
            STATE.modal = { type: 'alert', title: 'Concluído', message: `Feito! ${marcados.length} pagamentos liquidados nas contas locais.` }; render();
          }
        }; render();
      });
      document.querySelectorAll('.vr-input').forEach(inp => inp.addEventListener('change', e => { STATE.vrMesAtual[e.target.dataset.id] = e.target.value; render(); }));
      document.querySelectorAll('.desc-input').forEach(inp => inp.addEventListener('change', e => { STATE.descontosMesAtual[e.target.dataset.id] = e.target.value; render(); }));
      document.getElementById('fFiltroMes')?.addEventListener('change', e => { STATE.folhaMesFiltro = e.target.value; STATE.descontosMesAtual = {}; STATE.vrMesAtual = {}; render(); });
      document.getElementById('btnCancelModal')?.addEventListener('click', () => { STATE.modal = null; render(); });
      document.getElementById('modalOverlay')?.addEventListener('click', e => { if (e.target.id === 'modalOverlay') { STATE.modal = null; render(); } });
      document.getElementById('btnNovoLanc')?.addEventListener('click', e => { STATE.modal = { type: 'novoLanc', tipo: e.target.dataset.tipo }; render(); });
      document.getElementById('btnLoteLanc')?.addEventListener('click', e => { STATE.modal = { type: 'loteLanc', tipo: e.target.dataset.tipo }; render(); });
      document.getElementById('btnNovoFunc')?.addEventListener('click', () => { STATE.modal = { type: 'novoFunc' }; render(); });
      document.getElementById('btnNovoCad')?.addEventListener('click', e => { const t = e.target.dataset.tipo; if (t === 'motoristas') STATE.modal = { type: 'novoMotorista' }; else if (t === 'bases') STATE.modal = { type: 'novoBase' }; else if (t === 'cidades') STATE.modal = { type: 'novoCidade' }; else if (t === 'veiculos') STATE.modal = { type: 'novoVeiculo' }; render(); });
      document.getElementById('btnNovoUser')?.addEventListener('click', () => { STATE.modal = { type: 'novoUser' }; render(); });
      document.getElementById('btnNovoContr')?.addEventListener('click', () => { STATE.modal = { type: 'novoContrato' }; render(); });

      document.getElementById('fMotoristaTop')?.addEventListener('change', e => {
        const moto = STATE.motoristas.find(x => x.nome === e.target.value);
        if (moto) {
          const p = document.getElementById('fPixAssoc'); if (p) p.value = moto.pix || '';
          const f = document.getElementById('fFavAssoc'); if (f) f.value = moto.nome;
        }
      });

      document.querySelectorAll('[data-del-base]').forEach(btn => btn.addEventListener('click', () => {
        const id = parseFloat(btn.dataset.delBase);
        STATE.modal = { type: 'confirm', title: 'Excluir Base', message: 'Tem certeza que deseja excluir esta base permanentemente?', onConfirm: () => { const idx = STATE.bases.findIndex(x => x.id === id); if (idx >= 0) STATE.bases.splice(idx, 1); STATE.modal = null; render(); } }; render();
      }));
      document.querySelectorAll('[data-del-cid]').forEach(btn => btn.addEventListener('click', () => {
        const id = parseFloat(btn.dataset.delCid);
        STATE.modal = { type: 'confirm', title: 'Excluir Cidade', message: 'Tem certeza que deseja excluir esta cidade permanentemente?', onConfirm: () => { const idx = STATE.cidades.findIndex(x => x.id === id); if (idx >= 0) STATE.cidades.splice(idx, 1); STATE.modal = null; render(); } }; render();
      }));
      document.querySelectorAll('[data-del-vei]').forEach(btn => btn.addEventListener('click', () => {
        const id = parseFloat(btn.dataset.delVei);
        STATE.modal = { type: 'confirm', title: 'Excluir Veículo', message: 'Tem certeza que deseja excluir este veículo permanentemente?', onConfirm: () => { const idx = STATE.veiculos.findIndex(x => x.id === id); if (idx >= 0) STATE.veiculos.splice(idx, 1); STATE.modal = null; render(); } }; render();
      }));
      document.querySelectorAll('[data-del-lanc]').forEach(btn => btn.addEventListener('click', () => {
        const id = parseFloat(btn.dataset.delLanc), tipo = btn.dataset.tipo;
        STATE.modal = {
          type: 'confirm', title: 'Exclusão de Registro', message: 'Tem certeza que quer excluir esse registro? Cuidado, esse processo é irreversível e excluirá as contas da aba atual.', onConfirm: () => {
            const lista = tipo === 'amazon' ? STATE.lancamentosAmazon : STATE.lancamentosMercado;
            const idx = lista.findIndex(x => x.id === id);
            if (idx >= 0) { lista.splice(idx, 1); STATE.modal = null; render(); }
          }
        }; render();
      }));

      document.getElementById('btnSalvarUnico')?.addEventListener('click', () => {
        const m = STATE.modal, data = document.getElementById('fDataOp').value, motorista = document.getElementById('fMotoristaTop').value, pix = document.getElementById('fPixAssoc').value, favorecido = document.getElementById('fFavAssoc').value, valor = parseFloat(document.getElementById('fValorLivre').value) || 0, base = document.getElementById('fBaseLivre').value;
        if (!data || !motorista || valor <= 0) { STATE.modal = { type: 'alert', message: 'Preencha Data, Motorista e um Valor válido em R$.' }; render(); return; }
        const lista = m.tipo === 'amazon' ? STATE.lancamentosAmazon : STATE.lancamentosMercado;
        lista.push({ id: Date.now(), data, motorista, pix, favorecido, valor, base, criadoPor: STATE.currentUser.name, criadoEm: today(), enviado: false });
        addLog(`Cadastrou lançamento direto ${m.tipo === 'amazon' ? 'Amazon' : 'Mercado Livre'} de R$ ${valor} para ${motorista}`);
        STATE.modal = null; render();
      });

      document.getElementById('btnProcessarLote')?.addEventListener('click', () => {
        const m = STATE.modal, txt = document.getElementById('fAreaLote').value.trim(), dataLote = document.getElementById('fDataLote').value;
        if (!txt || !dataLote) { STATE.modal = { type: 'alert', message: 'Preencha os campos e cole os dados corretamente na caixa de texto central.' }; render(); return; }
        const lista = m.tipo === 'amazon' ? STATE.lancamentosAmazon : STATE.lancamentosMercado;
        let count = 0;
        txt.split('\n').forEach((linha, idx) => {
          const partes = linha.trim().split(/\t|\s{2,}/);
            if (partes.length >= 2) {
              const nome = partes[0].trim(), valor = parseFloat(partes[1].replace(',', '.').replace(/[^0-9.]/g, '')) || 0, base = partes[2] ? partes[2].trim().toUpperCase() : 'N/A';
              if (nome && valor > 0) {
                const mot = STATE.motoristas.find(x => x.nome.toLowerCase() === nome.toLowerCase()) || { pix: 'Não localizado', nome: nome };
                lista.push({ id: Date.now() + idx, data: dataLote, motorista: nome, pix: mot.pix || 'S/ PIX', favorecido: mot.nome, valor, base, criadoPor: STATE.currentUser.name + ' (Lote)', criadoEm: today(), enviado: false });
                count++;
              }
            }
        });
        addLog(`Importou ${count} lançamentos locais em lote (${m.tipo === 'amazon' ? 'Amazon' : 'Mercado Livre'})`);
        STATE.modal = { type: 'alert', title: 'Lote Processado', message: `Lote processado com sucesso!<br>${count} registros salvos localmente nesta sessão (Aguardam autorização de envio do Supervisor).` }; render();
      });

      document.getElementById('btnEnviarFinOp')?.addEventListener('click', e => {
        const tipo = e.target.dataset.tipo;
        const lista = tipo === 'amazon' ? STATE.lancamentosAmazon : STATE.lancamentosMercado;
        const pendentes = lista.filter(x => !x.enviado);
        if (pendentes.length === 0) return;
        STATE.modal = {
          type: 'confirm', title: 'Finalização de Repasse Financeiro', message: `Tem certeza que deseja oficializar e enviar esses <b>${pendentes.length} pagamentos pendentes</b> para o time Financeiro efetuar a transação hoje?`, onConfirm: () => {
            pendentes.forEach((l, i) => {
              l.enviado = true;
              l.contaId = Date.now() + i;
              STATE.contasPagar.push({ id: l.contaId, motorista: l.motorista, semana: l.data.slice(0, 7), valor: l.valor, pix: l.pix, status: 'pendente', dataPagamento: null, pagoBy: null, origem: tipo });
            });
            addLog(`Supervisor enviou pacote de ${pendentes.length} pendências do ${tipo} para Caixa Geral`);
            STATE.modal = { type: 'alert', title: 'Tudo Certo!', message: `Sucesso! Foram abertas ${pendentes.length} contas a pagar vinculadas no painel do Financeiro Central.` }; render();
          }
        }; render();
      });
      document.querySelectorAll('[data-edit-mot]').forEach(btn => btn.addEventListener('click', () => { const m = STATE.motoristas.find(x => x.id === parseFloat(btn.dataset.editMot)); STATE.modal = { type: 'editMotorista', id: m.id, data: { ...m } }; render(); }));
      document.querySelectorAll('[data-edit-base]').forEach(btn => btn.addEventListener('click', () => { const b = STATE.bases.find(x => x.id === parseFloat(btn.dataset.editBase)); STATE.modal = { type: 'editBase', id: b.id, data: { ...b } }; render(); }));
      document.querySelectorAll('[data-edit-contr]').forEach(btn => btn.addEventListener('click', () => { const c = STATE.contratosEmpresa.find(x => x.id === parseFloat(btn.dataset.editContr)); STATE.modal = { type: 'editContrato', id: c.id, data: { ...c } }; render(); }));
      document.querySelectorAll('[data-edit-cid]').forEach(btn => btn.addEventListener('click', () => { const c = STATE.cidades.find(x => x.id === parseFloat(btn.dataset.editCid)); STATE.modal = { type: 'editCidade', id: c.id, data: { ...c } }; render(); }));
      document.querySelectorAll('[data-edit-vei]').forEach(btn => btn.addEventListener('click', () => { const v = STATE.veiculos.find(x => x.id === parseFloat(btn.dataset.editVei)); STATE.modal = { type: 'editVeiculo', id: v.id, data: { ...v } }; render(); }));
      document.querySelectorAll('[data-edit-user]').forEach(btn => btn.addEventListener('click', () => { const u = STATE.users.find(x => x.id === parseFloat(btn.dataset.editUser)); STATE.modal = { type: 'editUser', id: u.id, data: { ...u } }; render(); }));
      document.querySelectorAll('[data-edit-func]').forEach(btn => btn.addEventListener('click', () => { const f = STATE.funcionarios.find(x => x.id === parseFloat(btn.dataset.editFunc)); STATE.modal = { type: 'editFunc', id: f.id, data: { ...f } }; render(); }));
      document.querySelectorAll('[data-reset-pass]').forEach(btn => btn.addEventListener('click', () => { const u = STATE.users.find(x => x.id === parseFloat(btn.dataset.resetPass)); STATE.modal = { type: 'resetPass', data: { ...u } }; render(); }));
      document.querySelectorAll('[data-pagar]').forEach(btn => btn.addEventListener('click', () => {
        const id = parseFloat(btn.dataset.pagar), c = STATE.contasPagar.find(x => x.id === id);
        STATE.modal = { type: 'confirm', title: 'Confirmar Pagamento', message: `Marcar pagamento de <strong>R$ ${c.valor.toLocaleString('pt-BR')}</strong> para <strong>${c.motorista}</strong> como pago?`, onConfirm: () => { c.status = 'pago'; c.dataPagamento = today(); c.pagoBy = STATE.currentUser.name; addLog(`Marcou pagamento de ${c.motorista} (${c.semana}) como pago — R$ ${c.valor.toLocaleString('pt-BR')}`); STATE.modal = null; render(); } }; render();
      }));
      document.getElementById('btnConfirmAction')?.addEventListener('click', () => STATE.modal?.onConfirm?.());
      document.getElementById('btnEnviarFolha')?.addEventListener('click', () => {
        STATE.modal = {
          type: 'confirm', title: 'Enviar Folha ao Financeiro', message: 'Confirma o envio da folha do mês selecionado (' + STATE.folhaMesFiltro + ') ao Financeiro?', onConfirm: () => {
            const m = STATE.folhaMesFiltro;
            let count = 0;
            STATE.funcionarios.filter(f => f.status === 'ativo').forEach(f => {
              const desc = Number(STATE.descontosMesAtual[f.id] || 0);
              const total = f.salario + f.vt - desc;
              const existe = STATE.contasPagar.find(c => c.motorista === f.nome && c.semana === m && c.origem === 'rh');
              if (!existe) {
                STATE.contasPagar.push({ id: Date.now() + f.id, motorista: f.nome, semana: m, valor: total, pix: f.pix, status: 'pendente', dataPagamento: null, pagoBy: null, origem: 'rh' });
                count++;
              }
            });
            addLog(`Enviou folha RH (${m}) ao Financeiro (${count} registros criados)`);
            STATE.descontosMesAtual = {};
            STATE.modal = { type: 'alert', title: 'Recursos Humanos', message: `Folha preenchida e enviada com segurança.<br/>(${count} pagamentos registrados pendentes)` }; render();
          }
        }; render();
      });
      document.getElementById('btnEnviarVR')?.addEventListener('click', () => {
        const total = STATE.funcionarios.filter(f => f.status === 'ativo').reduce((s, f) => s + Number(STATE.vrMesAtual[f.id] || 0), 0);
        STATE.modal = { type: 'enviarVR', data: { total } }; render();
      });
      document.getElementById('btnConfirmVR')?.addEventListener('click', () => {
        const boleto = document.getElementById('fBoletoVR').value.trim();
        if (!boleto) { STATE.modal = { type: 'alert', message: 'Informe o código ou linha digitável do boleto.' }; render(); return; }
        const mesAtual = STATE.folhaMesFiltro;
        const total = STATE.modal.data.total;
        const existe = STATE.contasPagar.find(c => c.motorista === 'iFood (VR)' && c.semana === mesAtual && c.origem === 'rh_vr');
        if (!existe) STATE.contasPagar.push({ id: Date.now(), motorista: 'iFood (VR)', semana: mesAtual, valor: total, pix: boleto, status: 'pendente', dataPagamento: null, pagoBy: null, origem: 'rh_vr' });
        addLog(`Enviou total de VR do mês ao Financeiro, via boleto`);
        STATE.vrMesAtual = {};
        STATE.modal = { type: 'alert', title: 'VR Computado', message: 'Valores de alimentação VR repassados ao fechamento Financeiro via boleto único!' }; render();
      });
      function quickAlert(msg) { STATE.modal = { type: 'alert', message: msg }; render(); }
      
      document.getElementById('btnSalvarContr')?.addEventListener('click', () => {
        const m = STATE.modal, parceiro = document.getElementById('fCParceiro').value.trim(), cnpj = document.getElementById('fCCnpj').value.trim(), tipo = document.getElementById('fCTipo').value, vigencia = document.getElementById('fCVigencia').value.trim(), valorBase = parseFloat(document.getElementById('fCValor').value) || 0, status = document.getElementById('fCStatus').value;
        if (!parceiro) return quickAlert('Especifique a empresa ou parceiro do contrato.');
        const fileInput = document.getElementById('fCUpload');
        let contratoUrl = m.data?.contratoUrl || '';
        if (fileInput && fileInput.files.length > 0) contratoUrl = URL.createObjectURL(fileInput.files[0]);
        if (m.type === 'novoContrato') { STATE.contratosEmpresa.push({ id: Date.now(), parceiro, cnpj, tipo, vigencia, valorBase, status, contratoUrl }); addLog(`Registrou contrato empresarial: ${parceiro}`); }
        else { Object.assign(STATE.contratosEmpresa.find(x => x.id === m.id), { parceiro, cnpj, tipo, vigencia, valorBase, status, contratoUrl }); addLog(`Editou contrato: ${parceiro}`); }
        STATE.modal = null; render();
      });

      document.getElementById('btnSalvarMot')?.addEventListener('click', () => {
        const m = STATE.modal, nome = document.getElementById('fNome').value.trim(), telefone = document.getElementById('fTel').value.trim(), cidade = document.getElementById('fCidadeBase').value, baseAtrelada = document.getElementById('fBaseAtrelada').value, veiculo = document.getElementById('fVeiculoPad').value, pix = document.getElementById('fPix').value.trim(), status = document.getElementById('fStatus').value;
        if (!nome) return quickAlert('O nome do motorista precisa ser informado e válido.');
        const fileInput = document.getElementById('fMotContrato');
        let contratoUrl = m.data?.contratoUrl || '';
        if (fileInput && fileInput.files.length > 0) contratoUrl = URL.createObjectURL(fileInput.files[0]);
        if (m.type === 'novoMotorista') { STATE.motoristas.push({ id: Date.now(), nome, telefone, cidade, baseAtrelada, veiculo, pix, status, contratoUrl }); addLog(`Cadastrou motorista: ${nome}`); }
        else { Object.assign(STATE.motoristas.find(x => x.id === m.id), { nome, telefone, cidade, baseAtrelada, veiculo, pix, status, contratoUrl }); addLog(`Editou motorista: ${nome}`); }
        STATE.modal = null; render();
      });
      document.getElementById('btnSalvarBase')?.addEventListener('click', () => {
        const m = STATE.modal, nome = document.getElementById('fNomeBase').value.trim();
        if (!nome) return quickAlert('Preencha o nome da base.');
        if (m.type === 'novoBase') { STATE.bases.push({ id: Date.now(), nome }); addLog(`Cadastrou base: ${nome}`); }
        else { Object.assign(STATE.bases.find(x => x.id === m.id), { nome }); addLog(`Editou base: ${nome}`); }
        STATE.modal = null; render();
      });
      document.getElementById('btnSalvarCid')?.addEventListener('click', () => {
        const m = STATE.modal, nome = document.getElementById('fNomeCid').value.trim();
        if (!nome) return quickAlert('Preencha o nome da cidade.');
        if (m.type === 'novoCidade') { STATE.cidades.push({ id: Date.now(), nome }); addLog(`Cadastrou cidade: ${nome}`); }
        else { Object.assign(STATE.cidades.find(x => x.id === m.id), { nome }); addLog(`Editou cidade: ${nome}`); }
        STATE.modal = null; render();
      });
      document.getElementById('btnSalvarVei')?.addEventListener('click', () => {
        const m = STATE.modal, tipo = document.getElementById('fTipoVei').value.trim();
        if (!tipo) return quickAlert('Informe o tipo de veículo.');
        if (m.type === 'novoVeiculo') { STATE.veiculos.push({ id: Date.now(), tipo }); addLog(`Cadastrou veículo: ${tipo}`); }
        else { Object.assign(STATE.veiculos.find(x => x.id === m.id), { tipo }); addLog(`Editou veículo: ${tipo}`); }
        STATE.modal = null; render();
      });
      document.getElementById('btnSalvarUser')?.addEventListener('click', () => {
        const m = STATE.modal, name = document.getElementById('fUserName').value.trim(), email = document.getElementById('fUserEmail').value.trim(), pass = document.getElementById('fUserPass').value, role = document.getElementById('fUserRole').value, active = document.getElementById('fUserStatus').value === '1';
        if (!name || !email) return quickAlert('Preencha as informações obrigatórias.');
        if (m.type === 'novoUser') { if (!pass) return quickAlert('Dê uma senha ao novo usuário.'); STATE.users.push({ id: Date.now(), name, email, password: pass, role, active, createdAt: today() }); addLog(`Criou usuário: ${name}`); }
        else { const u = STATE.users.find(x => x.id === m.id); Object.assign(u, { name, email, role, active }); if (pass) u.password = pass; addLog(`Editou usuário: ${name}`); }
        STATE.modal = null; render();
      });
      document.getElementById('btnSalvarFunc')?.addEventListener('click', () => {
        const m = STATE.modal, nome = document.getElementById('fFuncNome').value.trim(), cargo = document.getElementById('fFuncCargo').value.trim(), salario = parseFloat(document.getElementById('fFuncSal').value) || 0, vt = parseFloat(document.getElementById('fFuncVT').value) || 0, pix = document.getElementById('fFuncPix').value.trim(), status = document.getElementById('fFuncStatus').value, admissao = document.getElementById('fFuncAdm').value;
        if (!nome || !cargo) return quickAlert('Dados parciais, preencha corretamente para adicionar ao contrato base.');
        const fileInput = document.getElementById('fFuncContrato');
        let contratoUrl = m.data?.contratoUrl || '';
        if (fileInput && fileInput.files.length > 0) contratoUrl = URL.createObjectURL(fileInput.files[0]);
        if (m.type === 'novoFunc') { STATE.funcionarios.push({ id: Date.now(), nome, cargo, salario, vt, pix, status, admissao, contratoUrl }); addLog(`Cadastrou funcionário: ${nome}`); }
        else { Object.assign(STATE.funcionarios.find(x => x.id === m.id), { nome, cargo, salario, vt, pix, status, admissao, contratoUrl }); addLog(`Editou funcionário: ${nome}`); }
        STATE.modal = null; render();
      });
      document.getElementById('btnConfirmResetPass')?.addEventListener('click', () => {
        const m = STATE.modal, nova = document.getElementById('fNewPass').value;
        if (!nova) { alert('Informe a nova senha.'); return; }
        STATE.users.find(x => x.id === m.data.id).password = nova; addLog(`Redefiniu senha do usuário: ${m.data.name}`); STATE.modal = null; alert('Senha redefinida!'); render();
      });
      document.getElementById('btnExportProd')?.addEventListener('click', () => { const rows = [['Data', 'Motorista', 'PIX', 'Favorecido', 'Valor', 'Origem']];[...STATE.lancamentosAmazon, ...STATE.lancamentosMercado].forEach(l => rows.push([l.data, l.motorista, l.pix, l.favorecido, l.valor, l.criadoPor.includes('Amazon') ? 'Amazon' : 'Mercado Livre'])); exportCSV(rows, 'lancamentos_hist.csv'); });
      document.getElementById('btnExportFin')?.addEventListener('click', () => { const rows = [['Motorista', 'Semana', 'Valor', 'Chave PIX', 'Status', 'Data Pagamento', 'Pago por']]; STATE.contasPagar.forEach(c => rows.push([c.motorista, c.semana, c.valor, c.pix, c.status, c.dataPagamento || '', c.pagoBy || ''])); exportCSV(rows, 'financeiro.csv'); });
      document.getElementById('btnExportRH')?.addEventListener('click', () => { const rows = [['Funcionário', 'Cargo', 'Salário', 'VT', 'Desconto', 'Total Mensal']]; STATE.funcionarios.filter(f => f.status === 'ativo').forEach(f => rows.push([f.nome, f.cargo, f.salario, f.vt, Number(STATE.descontosMesAtual[f.id] || 0), f.salario + f.vt - Number(STATE.descontosMesAtual[f.id] || 0)])); exportCSV(rows, 'folha_rh_deducoes.csv'); });
    }

    function exportCSV(rows, filename) {
      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url);
    }

    render();
  </script>
</body>

</html>
