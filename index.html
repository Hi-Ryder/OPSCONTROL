    :root {
      --primary: #1e40af; /* Deeper Corporate Blue */
      --primary-hover: #1e3a8a;
      --primary-light: #eff6ff;
      --bg: #f3f4f6;
      --card-bg: #ffffff;
      --sidebar-bg: #111827; /* Dark Slate for Sidebar */
      --text-main: #111827;
      --text-secondary: #374151;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --success: #059669;
      --danger: #dc2626;
      --warning: #d97706;
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --radius: 8px; /* Sharper Corporate Radius */
    }

    body.dark {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --sidebar-bg: #020617;
      --text-main: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border: #334155;
    }


    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      font-size: 14px;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    h1, h2, h3, .stat-value {
      font-family: 'Outfit', sans-serif;
    }

    /* Glassmorphism Effect */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes modalScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .animate-fade { animation: fadeIn 0.4s ease-out; }
    .animate-slide { animation: slideUp 0.5s ease-out; }

    /* Layout Components */
    .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      height: 100vh;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-item {
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 12px 24px;
      border: none;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      transition: all 0.2s;
    }

    .nav-item span:first-child {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 16px;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    .nav-item.active {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border-left: 4px solid var(--primary);
      padding-left: 20px; /* Offset for border */
    }

    .main-content {
      flex: 1;
      padding: 24px 32px;
      overflow-y: auto;
    }

    /* UI Components */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .stat-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px;
      box-shadow: var(--shadow);
    }


    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-main);
    }

    /* Buttons */
    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .btn-outline:hover {
      background: var(--primary-light);
    }

    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #10b981; filter: brightness(1.1); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
    
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #ef4444; filter: brightness(1.1); }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #f8fafc;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 10px 16px;
      text-align: left;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
    }

    body.dark th { background: #1e293b; }

    td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 13px;
    }

    tr:hover td {
      background: #f9fafb;
    }


    body.dark tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    /* Badges */
    .badge {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-block;
    }

    .badge-blue { background: #eff6ff; color: #2563eb; border: 1px solid #dbeafe; }
    .badge-green { background: #ecfdf5; color: #059669; border: 1px solid #d1fae5; }
    .badge-red { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
    .badge-gray { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .badge-yellow { background: #fffbeb; color: #92400e; border: 1px solid #fef3c7; }
    .badge-purple { background: #faf5ff; color: #7c3aed; border: 1px solid #ddd6fe; }
    .badge-orange { background: #fff7ed; color: #ea580c; border: 1px solid #ffedd5; }

    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    
    input, select, textarea {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--text-main);
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
    }

    /* Modals */
    .modal-overlay {
      background: rgba(15, 23, 42, 0.75);
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 550px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    /* Custom Chart Styles */
    .chart-bar {
      transition: height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .chart-path {
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
      animation: drawLine 2s forwards ease-in-out;
    }

    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

  </style>
</head>

            ${document.body.classList.contains('dark') ? '☀️' : '🌙'}

          <button id="btnLogout" style="background:rgba(239,68,68,0.1);color:#fca5a5;padding:6px;font-size:11px;border-radius:4px">

    <main class="main-content">

          ${alerts.map(a => `<div style="background:${a.type === 'warning' ? '#fffbeb' : '#fef2f2'}; border:1px solid ${a.type === 'warning' ? '#fef3c7' : '#fee2e2'}; color:${a.type === 'warning' ? '#92400e' : '#991b1b'}; padding:10px 16px; border-radius:6px; font-size:12px; font-weight:600; display:flex; align-items:center; gap:8px">

    function buildSection() {
      switch (STATE.activeMenu) {
        case 'dashboard': return buildDashboard();
        case 'amazon': return buildLancamentos('amazon');
        case 'mercado': return buildLancamentos('mercado');
        case 'petlove': return buildLancamentos('petlove');
        case 'shopee': return buildLancamentos('shopee');
        case 'outros': return buildLancamentos('outros');
        case 'financeiro': return buildFinanceiro();
        case 'rh': return buildRH();
        case 'cadastros': return buildCadastros();
        case 'relatorios': return buildRelatorios();
        case 'contratos': return buildContratos();
        case 'fechamento': return buildFechamento();
        case 'administracao': return buildAdministracao();
        default: return '<p>Módulo em desenvolvimento</p>';
      }
    }

    function buildDashboard() {
      const ops = ['amazon', 'mercado', 'petlove', 'shopee', 'outros'];
      const all = ops.flatMap(o => STATE['lancamentos' + o.charAt(0).toUpperCase() + o.slice(1)] || []);

      const pendentes = STATE.contasPagar.filter(c => c.status === 'pendente');
      const pagos = STATE.contasPagar.filter(c => c.status === 'pago');
      const totalPend = pendentes.reduce((s, c) => s + c.valor, 0);
      const totalPago = pagos.reduce((s, c) => s + c.valor, 0);
      const percPago = totalValor > 0 ? (totalPago / (totalPago + totalPend) * 100).toFixed(1) : 0;

      const pends = {};

      const filter = STATE.dashboardFilter;

      const filteredAll = filter === 'all' ? all : (STATE[key] || []);
      const displayTotal = filteredAll.reduce((s, l) => s + l.valor, 0);
      const displayPend = filter === 'all' ? totalPend : (pends[filter] || 0);

      const titulos = { all: 'Geral (Consolidado)', amazon: 'Amazon Logistics', mercado: 'Mercado Livre', petlove: 'Petlove', shopee: 'Shopee', outros: 'Outros Operations' };

          <div class="stat-value">R$ ${displayTotal.toLocaleString('pt-BR')}</div>
          <div style="font-size:11px; color:var(--text-muted); margin-top:4px">Volume bruto processado</div>
        </div>
        
        <div class="stat-card" style="border-left: 4px solid var(--danger)">
          <div class="stat-label">Pendente ${filter === 'all' ? 'Total' : 'Operação'}</div>

          <div style="font-size:11px; color:var(--text-muted); margin-top:4px">${pendentes.filter(c => filter === 'all' || c.origem === filter).length} pagamentos abertos</div>
        </div>

        <div class="stat-card" style="border-left: 4px solid var(--success)">
          <div class="stat-label">Liquidação</div>
          <div class="stat-value" style="color:var(--success)">R$ ${(filter === 'all' ? totalPago : pagos.filter(c => c.origem === filter).reduce((s,c)=>s+c.valor,0)).toLocaleString('pt-BR')}</div>
          <div style="font-size:11px; color:var(--text-muted); margin-top:4px">Baixas confirmadas</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">Eficiência Global</div>
          <div class="stat-value">${percPago}%</div>

        </div>

      <div style="display:grid; grid-template-columns: 240px 1fr; gap:24px; margin-bottom:24px">
        <!-- Dashboard Internal Menu -->
        <div style="display:flex; flex-direction:column; gap:6px">

          <button class="btn-${filter === 'all' ? 'primary' : 'outline'}" style="width:100%; justify-content:flex-start; height:40px; font-size:12px; border-radius:6px" data-dash-filter="all">
            <span style="width:20px; display:inline-block">📊</span> Visão Geral
          </button>
          <button class="btn-${filter === 'amazon' ? 'primary' : 'outline'}" style="width:100%; justify-content:flex-start; height:40px; font-size:12px; border-radius:6px" data-dash-filter="amazon">
            <span style="width:20px; display:inline-block">📦</span> Amazon
          </button>
          <button class="btn-${filter === 'mercado' ? 'primary' : 'outline'}" style="width:100%; justify-content:flex-start; height:40px; font-size:12px; border-radius:6px" data-dash-filter="mercado">
            <span style="width:20px; display:inline-block">🛒</span> Mercado Livre
          </button>
          <button class="btn-${filter === 'petlove' ? 'primary' : 'outline'}" style="width:100%; justify-content:flex-start; height:40px; font-size:12px; border-radius:6px" data-dash-filter="petlove">
            <span style="width:20px; display:inline-block">🐕</span> Petlove
          </button>
          <button class="btn-${filter === 'shopee' ? 'primary' : 'outline'}" style="width:100%; justify-content:flex-start; height:40px; font-size:12px; border-radius:6px" data-dash-filter="shopee">
            <span style="width:20px; display:inline-block">🛍️</span> Shopee
          </button>
          <button class="btn-${filter === 'outros' ? 'primary' : 'outline'}" style="width:100%; justify-content:flex-start; height:40px; font-size:12px; border-radius:6px" data-dash-filter="outros">
            <span style="width:20px; display:inline-block">📁</span> Outros

        <!-- Main Dashboard Content -->
        <div>

            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; margin-bottom:24px">
              ${ops.map(o => {
                const vol = (STATE['lancamentos' + o.charAt(0).toUpperCase() + o.slice(1)] || []).reduce((s,l)=>s+l.valor,0);
                const pend = pendentes.filter(c => c.origem === o).reduce((s,c)=>s+c.valor,0);
                const colors = { amazon: 'var(--primary)', mercado: '#fbbf24', petlove: '#7c3aed', shopee: '#ea580c', outros: '#64748b' };
                return `<div class="card" style="padding:16px; border-top: 3px solid ${colors[o] || '#cbd5e1'}">
                  <div style="font-size:11px; font-weight:700; color:var(--text-muted); margin-bottom:8px">${titulos[o]}</div>

                  <div style="font-size:11px; color:var(--danger); margin-top:4px; font-weight:600">Pendentes: R$ ${pend.toLocaleString('pt-BR')}</div>

              }).join('')}

              <span>Últimos Lançamentos — ${titulos[filter]}</span>
              <button class="btn-outline" style="font-size:11px; padding:4px 10px" data-menu="${filter === 'all' ? 'relatorios' : filter}">Ver Tudo</button>

                    const pago = findPaymentDate(null, l.motorista, l.valor, origem);
                    const badgeClass = origem === 'amazon' ? 'badge-blue' : (origem === 'mercado' ? 'badge-yellow' : (origem === 'petlove' ? 'badge-purple' : (origem === 'shopee' ? 'badge-orange' : 'badge-gray')));
                    return `<tr>
                      <td style="font-size:11px; color:var(--text-muted)">${l.data}</td>
                      <td style="font-weight:600; color:var(--text-main)">${l.motorista}</td>
                      <td><span class="badge ${badgeClass}" style="font-size:10px">${origem.toUpperCase()}</span></td>
                      <td><span class="badge badge-gray" style="font-size:10px">${l.base}</span></td>

                    </tr>`;

          ${filter !== 'all' ? `

                filteredAll.forEach(l => { porBase[l.base] = (porBase[l.base] || 0) + l.valor; });
                const sorted = Object.entries(porBase).sort((a,b) => b[1] - a[1]);

                const barColor = { amazon: 'var(--primary)', mercado: '#fbbf24', petlove: '#7c3aed', shopee: '#ea580c', outros: '#64748b' }[filter] || 'var(--primary)';

        const matchStart = !STATE.filters.dataInicio || l.data >= STATE.filters.dataInicio;

        if (l.enviado) {
          const c = STATE.contasPagar.find(x => (l.contaId && x.id === l.contaId) || (!l.contaId && x.motorista === l.motorista && x.valor === l.valor && x.origem === tipo));
          if (c && c.status === 'pago') statusHTML = '<span class="badge badge-green">✔ Pago</span>';
          else statusHTML = '<span class="badge badge-blue">Aguardando</span>';
        }
        const pgDate = findPaymentDate(l.id, l.motorista, l.valor, tipo);
        return `<tr>
                <td><span style="font-weight:700; color:var(--text-main)">${l.data}</span></td>
                <td><div style="font-weight:600; color:var(--primary)">${l.motorista}</div></td>

                <td style="font-family:'JetBrains Mono', monospace; font-size:12px">${l.pix}</td>
                <td><span style="font-size:12px">${l.favorecido}</span></td>

                <td>${statusHTML}</td>
                <td style="font-weight:700; color:var(--success)">${pgDate || ''}</td>
                <td>

                    ${l.enviado ? '' : `<button class="btn-outline" style="padding:6px 12px; border-color:var(--danger); color:var(--danger)" data-del-lanc="${l.id}" data-tipo="${tipo}">Excluir</button>`}
                    <button class="btn-outline" style="padding:6px 12px" data-extrato-mot="${l.motorista}">Extrato</button>
                  </div>
                </td>
              </tr>`;
      }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
    }


    function buildFechamento() {

      const listaCompleta = STATE.lancamentosFechamento.filter(l => l.base === activeBase);

        return matchStart && matchEnd && matchMotorista && matchLogin;

  // Evento Gerar Arquivos Motoristas (PDF/ZIP)
  document.getElementById('btnGerarArquivosMot')?.addEventListener('click', async () => {
    const { jsPDF } = window.jspdf;
    const zip = new JSZip();
    const activeBase = STATE.activeSubTab;
    const dataIni = STATE.filters.dataInicio;
    const dataFim = STATE.filters.dataFim;

    if (!dataIni || !dataFim) {
      alert("Por favor, selecione um período (Início e Fim) para gerar os arquivos.");
      return;
    }

    const lancamentos = STATE.lancamentosFechamento.filter(l => 
      l.base === activeBase && l.data >= dataIni && l.data <= dataFim && l.motorista
    );

    if (lancamentos.length === 0) {
      alert("Nenhum lançamento com motorista encontrado no período selecionado.");
      return;
    }

    // Agrupar por motorista
    const porMotorista = {};
    lancamentos.forEach(l => {
      if (!porMotorista[l.motorista]) porMotorista[l.motorista] = [];
      porMotorista[l.motorista].push(l);
    });

    const btn = document.getElementById('btnGerarArquivosMot');
    const originalText = btn.innerHTML;
    btn.innerHTML = "⏳ Processando...";
    btn.disabled = true;

    try {
      for (const motorista in porMotorista) {
        const doc = new jsPDF();
        const records = porMotorista[motorista];
        const totalMot = records.reduce((s, r) => s + r.total, 0);
        const motoristaInfo = STATE.motoristas.find(m => m.nome === motorista);

        // Cabeçalho do PDF
        doc.setFontSize(18);
        doc.setTextColor(30, 64, 175);
        doc.text("Espelho de Repasse Operacional", 14, 20);
        
        doc.setFontSize(12);
        doc.setTextColor(100);
        doc.text(`Motorista: ${motorista}`, 14, 30);
        doc.text(`Base: ${activeBase}`, 14, 37);
        doc.text(`Período: ${dataIni.split('-').reverse().join('/')} até ${dataFim.split('-').reverse().join('/')}`, 14, 44);

        // Tabela de Rotas
        const tableData = records.map(r => [
          r.data.split('-').reverse().join('/'),
          r.login,
          r.veiculo,
          r.cidade,
          `R$ ${r.rota.toLocaleString('pt-BR')}`,
          `R$ ${r.pedagio.toLocaleString('pt-BR')}`,
          `R$ ${r.adicional.toLocaleString('pt-BR')}`,
          `- R$ ${r.combustivel.toLocaleString('pt-BR')}`,
          `- R$ ${(r.desconto || 0).toLocaleString('pt-BR')}`,
          `R$ ${r.total.toLocaleString('pt-BR')}`
        ]);

        doc.autoTable({
          startY: 55,
          head: [['Data', 'Login', 'Veículo', 'Cidade', 'Rota', 'Ped.', 'Adic.', 'Comb.', 'Desc.', 'Total']],
          body: tableData,
          theme: 'striped',
          headStyles: { fillColor: [30, 64, 175] },
          styles: { fontSize: 8 },
          margin: { top: 50 }
        });

        // Detalhamento de Descontos
        let currentY = doc.lastAutoTable.finalY + 15;
        const descontosJustificados = records.filter(r => r.desconto > 0 && r.justificativa);
        
        if (descontosJustificados.length > 0) {
          doc.setFontSize(11);
          doc.setTextColor(185, 28, 28); // Red
          doc.text("Detalhamento de Descontos:", 14, currentY);
          currentY += 6;
          doc.setFontSize(9);
          doc.setTextColor(80);
          descontosJustificados.forEach(dj => {
            doc.text(`• Dia ${dj.data.split('-').reverse().join('/')}: R$ ${dj.desconto.toLocaleString('pt-BR')} - Motivo: ${dj.justificativa}`, 16, currentY);
            currentY += 5;
          });
          currentY += 5;
        }

        // Rodapé com Total e PIX
        doc.setFontSize(14);
        doc.setTextColor(0);
        doc.text(`VALOR TOTAL A RECEBER: R$ ${totalMot.toLocaleString('pt-BR')}`, 14, currentY);
        currentY += 10;
        
        doc.setFontSize(11);
        doc.setTextColor(30, 64, 175);
        doc.text(`CHAVE PIX PARA PAGAMENTO: ${motoristaInfo?.pix || 'NÃO CADASTRADA'}`, 14, currentY);
        currentY += 6;
        doc.setFontSize(9);
        doc.setTextColor(100);
        doc.text(`Favorecido: ${motoristaInfo?.favorecido || motorista}`, 14, currentY);
        currentY += 12;

        doc.setFontSize(9);
        doc.setTextColor(150);
        doc.text("Este documento é um espelho para conferência. Em caso de divergência, procure seu supervisor.", 14, currentY);
        doc.text(`Gerado em: ${new Date().toLocaleString('pt-BR')}`, 14, currentY + 6);

        // Adicionar ao ZIP
        const pdfBlob = doc.output('blob');
        zip.file(`${motorista.replace(/ /g, '_')}.pdf`, pdfBlob);
      }

      const content = await zip.generateAsync({ type: "blob" });
      const url = URL.createObjectURL(content);
      const a = document.createElement("a");
      a.href = url;
      a.download = `Fechamento_${activeBase}_${dataIni}_a_${dataFim}.zip`;
      a.click();
      URL.revokeObjectURL(url);
      
      alert("Arquivos gerados com sucesso!");
    } catch (err) {
      console.error(err);
      alert("Erro ao gerar arquivos.");
    } finally {
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  });

    function exportCSV(rows, filename) {
      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });

    ['mousemove','keydown','click','scroll','touchstart'].forEach(ev => document.addEventListener(ev, resetIdle, true));
    resetIdle();

    // ── Tour Guiado / Onboarding ──
    function startTour() {
      const steps = [
        { title: 'Bem-vindo ao OpsControl! \ud83d\ude80', msg: 'Este é o sistema de controle de pagamentos da Morais Transportes. Vou te mostrar as funcionalidades principais.' },
        { title: '\ud83d\udcca Dashboard', msg: 'Aqui você vê a visão geral: movimentação total, pagamentos pendentes, eficiência e gráficos de evolução mensal.' },
        { title: '\ud83d\udce6 Amazon e Mercado Livre', msg: 'Nos módulos de operação, você lança pagamentos para motoristas. Pode lançar individual ou em lote (colar da planilha).' },
        { title: '\ud83d\udcb0 Financeiro', msg: 'Aqui o financeiro visualiza todas as contas a pagar, filtra por base e realiza pagamentos individualmente ou em lote.' },
        { title: '\ud83d\udc65 Cadastros', msg: 'Gerencie motoristas, bases, cidades e veículos. Cadastre novos ou edite os existentes a qualquer momento.' },
        { title: '\ud83d\udcc4 Relatórios', msg: 'Gere relatórios detalhados de produção, custos por base e financeiro. Exporte em CSV para Excel.' },
        { title: '\ud83c\udf19 Modo Escuro', msg: 'Ative o modo escuro clicando no botão na barra lateral, abaixo do seu nome. A preferência é salva automaticamente.' },
        { title: 'Pronto! \u2705', msg: 'Você já pode começar a usar o sistema. Se precisar rever o tour, acesse Administração > Tour Guiado.' },
      ];
      let idx = 0;
      function showStep() {
        const s = steps[idx];
        STATE.modal = { type: 'alert', title: s.title + ' (' + (idx+1) + '/' + steps.length + ')', message: s.msg };
        render();
        const okBtn = document.getElementById('btnCancelModal');
        if (okBtn) {
          okBtn.textContent = idx < steps.length - 1 ? 'Próximo \u2192' : 'Finalizar Tour';
          okBtn.onclick = (e) => { e.stopPropagation(); idx++; if (idx < steps.length) showStep(); else { STATE.modal = null; render(); localStorage.setItem('opscontrol_tour_done','1'); } };
        }
      }
      showStep();
    }
    // Auto-trigger tour on first login
    const origRender = render;
    let _tourChecked = false;
    render = function() {
      origRender();
      if (!_tourChecked && STATE.view === 'app' && STATE.currentUser) {
        _tourChecked = true;
        if (!localStorage.getItem('opscontrol_tour_done')) {
          setTimeout(startTour, 500);
        }
      }
      // Attach extrato motorista buttons
      document.querySelectorAll('[data-extrato-mot]').forEach(btn => {
        btn.addEventListener('click', () => {
          STATE.modal = { type: 'extratoMotorista', data: { nome: btn.dataset.extratoMot }, large: true };
          render();
        });
      });
    };
